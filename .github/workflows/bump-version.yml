# .github/workflows/bump-version.yml
name: Bump version on merge to main

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Extract version from merged branch name
        id: get_version
        run: |
          # Récupère le nom de la branche mergée depuis le message du dernier commit
          BRANCH=$(git log -1 --pretty=%B | grep -oP "release/\K[\d]+\.[\d]+\.[\d]+" | head -1)
          
          if [ -z "$BRANCH" ]; then
            echo "❌ Pas de branche release/* détectée, skip."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "version=${BRANCH}" >> $GITHUB_OUTPUT
          echo "✓ Version détectée : ${BRANCH}"

      - name: Update pyproject.toml
        if: steps.get_version.outputs.skip != 'true'
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.get_version.outputs.version }}\"/" pyproject.toml

      - name: Create bump PR and auto-merge
        if: steps.get_version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          BRANCH="chore/bump-version-to-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          git add pyproject.toml
          git commit -m "chore: bump version to ${VERSION}"
          git tag "v${VERSION}"
          git push origin "${BRANCH}" --tags

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore: bump version to ${VERSION}" \
            --body "Version bump automatique suite au merge de la release ${VERSION}."

          gh pr merge "${BRANCH}" --merge --delete-branch