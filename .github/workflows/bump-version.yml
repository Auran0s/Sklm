# .github/workflows/bump-version.yml
name: Bump version on merge to main

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Extract version from merged branch name
        id: get_version
        run: |
          # Récupère le nom de la branche mergée depuis le message du dernier commit
          BRANCH=$(git log -1 --pretty=%B | grep -oP "release/\K[\d]+\.[\d]+\.[\d]+")
          
          if [ -z "$BRANCH" ]; then
            echo "❌ Pas de branche release/* détectée, skip."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "version=$BRANCH" >> $GITHUB_OUTPUT
          echo "✓ Version détectée : $BRANCH"

      - name: Update pyproject.toml
        if: steps.get_version.outputs.skip != 'true'
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.get_version.outputs.version }}\"/" pyproject.toml

      - name: Create git tag
        if: steps.get_version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT }}@github.com/${{ github.repository }}  # ← et ici
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.get_version.outputs.version }}"
          git tag "v${{ steps.get_version.outputs.version }}"
          git push
          git push --tags